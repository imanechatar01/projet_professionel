<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Connexion Admin | Ecotrips Women</title>

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' http://localhost:5000;">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300;400;500;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(222,148,164,0.18), transparent 36%),
        linear-gradient(135deg, #fffaf7 0%, #f8f5f2 48%, #fff0f4 100%);
      color: #231f20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=1400&q=80");
      background-size: cover;
      background-position: center;
      opacity: 0.08;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(1px);
      z-index: -1;
    }

    .logo-link {
      position: absolute;
      top: 28px;
      left: 34px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #231f20;
    }

    .logo-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: #de94a4;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 0 14px 34px rgba(222,148,164,0.32);
    }

    .logo-text {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 1.1rem;
      line-height: 1;
    }

    .logo-sub {
      font-size: 0.74rem;
      color: #8f7c82;
      margin-top: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(222,148,164,0.18);
      border-radius: 30px;
      padding: 2.5rem;
      box-shadow: 0 28px 80px rgba(60, 35, 42, 0.13);
      backdrop-filter: blur(16px);
    }

    .admin-badge {
      width: fit-content;
      margin: 0 auto 1.2rem;
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      background: #fff0f4;
      color: #b65c7a;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Fraunces', serif;
      text-align: center;
      font-size: 2.5rem;
      font-weight: 650;
      color: #231f20;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      text-align: center;
      color: #7e6f73;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.8rem;
    }

    .error,
    .success {
      display: none;
      padding: 0.9rem 1rem;
      border-radius: 16px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .error {
      background: #fff0f3;
      color: #be123c;
      border: 1px solid #fecdd3;
    }

    .success {
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 800;
      color: #6b5f63;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input {
      width: 100%;
      border: 1.5px solid #f1dbe2;
      background: #fffafd;
      padding: 0.95rem 1rem;
      border-radius: 16px;
      outline: none;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: #231f20;
      transition: all 0.2s ease;
    }

    input::placeholder {
      color: #b7a8ad;
    }

    input:focus {
      border-color: #de94a4;
      background: white;
      box-shadow: 0 0 0 4px rgba(222,148,164,0.15);
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 3.2rem;
    }

    .toggle-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      color: #9f8b91;
      font-size: 0.8rem;
      font-weight: 700;
    }

    button[type="submit"] {
      width: 100%;
      border: none;
      background: linear-gradient(135deg, #de94a4 0%, #b65c7a 100%);
      color: white;
      padding: 1rem;
      border-radius: 18px;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 0.4rem;
      box-shadow: 0 18px 36px rgba(182,92,122,0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    button[type="submit"]:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 22px 44px rgba(182,92,122,0.32);
    }

    button[type="submit"]:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.6rem 0;
      color: #b7a8ad;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #f1dbe2;
    }

    .public-link {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      padding: 0.95rem;
      border-radius: 18px;
      border: 1.5px solid #166534;
      color: #166534;
      font-weight: 800;
      transition: all 0.2s ease;
    }

    .public-link:hover {
      background: #166534;
      color: white;
    }

    .bottom-note {
      text-align: center;
      color: #9f8b91;
      font-size: 0.78rem;
      margin-top: 1.6rem;
    }

    .bottom-note span {
      color: #b65c7a;
      font-weight: 800;
    }

    @media (max-width: 600px) {
      body {
        padding: 1rem;
        align-items: flex-start;
        padding-top: 6rem;
      }

      .logo-link {
        top: 20px;
        left: 20px;
      }

      .container {
        padding: 2rem 1.4rem;
        border-radius: 24px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <a class="logo-link" href="../../frontend-public/cliente/web_site.html">
    <div class="logo-mark">EW</div>
    <div>
      <div class="logo-text">ecotrips_women</div>
      <div class="logo-sub">Administration</div>
    </div>
  </a>

  <main class="container">
    <div class="admin-badge">Espace Admin</div>

    <h1>Bienvenue</h1>

    <div class="subtitle">
      Connexion à votre tableau de bord administratif
    </div>

    <div id="errorMessage" class="error"></div>
    <div id="successMessage" class="success"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Adresse email</label>
        <input
          id="email"
          type="email"
          placeholder="admin@ecotripswomen.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-wrap">
          <input
            id="password"
            type="password"
            placeholder="Mot de passe"
            autocomplete="current-password"
            required
          >
          <button type="button" class="toggle-btn" id="togglePassword">
            Voir
          </button>
        </div>
      </div>

      <button type="submit" id="submitBtn">
        Se connecter
      </button>
    </form>

    <div class="divider">
      <span>OU</span>
    </div>

    <a class="public-link" href="../../frontend-public/cliente/web_site.html">
      Voir le site public
    </a>

    <p class="bottom-note">
      © 2026 <span>Ecotripswomen</span> · Administration
    </p>
  </main>

  <script>
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const submitBtn = document.getElementById("submitBtn");
    const loginForm = document.getElementById("loginForm");
    const errorDiv = document.getElementById("errorMessage");
    const successDiv = document.getElementById("successMessage");
    const toggleBtn = document.getElementById("togglePassword");

    function hideMessages() {
      errorDiv.style.display = "none";
      successDiv.style.display = "none";
    }

    function showError(message) {
      errorDiv.textContent = "⚠️ " + message;
      errorDiv.style.display = "block";
      successDiv.style.display = "none";
    }

    function showSuccess(message) {
      successDiv.textContent = "✅ " + message;
      successDiv.style.display = "block";
      errorDiv.style.display = "none";
    }

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

    toggleBtn.addEventListener("click", function () {
      const isHidden = passwordInput.type === "password";

      passwordInput.type = isHidden ? "text" : "password";
      toggleBtn.textContent = isHidden ? "Cacher" : "Voir";
    });

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideMessages();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!validateEmail(email)) {
        showError("Veuillez entrer une adresse email valide.");
        return;
      }

      if (!password) {
        showError("Le mot de passe est requis.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Connexion...";

      try {
        const response = await fetch("http://localhost:5000/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          localStorage.setItem("token", data.token);
          localStorage.setItem("adminToken", data.token);
          localStorage.setItem("admin", JSON.stringify(data.admin || {}));

          const adminName =
            data.admin?.prenom ||
            data.admin?.nom ||
            "Admin";

          showSuccess(`Bienvenue, ${adminName} ! Connexion réussie.`);

          setTimeout(function () {
            window.location.href = "admin/dashboard.html";
          }, 1000);
        } else {
          showError(data.message || "Email ou mot de passe incorrect.");
        }
      } catch (error) {
        console.error("Erreur:", error);
        showError("Impossible de contacter le serveur. Vérifiez que le backend est démarré.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Se connecter";
      }
    });
  </script>

</body>
</html>

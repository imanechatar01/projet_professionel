<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Connexion Client | Ecotrips Women</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/design-system.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
</head>

<body>

  <a class="logo-link" href="web_site.html">
    <div class="logo-mark">EW</div>
    <div>
      <div class="logo-text">ecotrips_women</div>
      <div class="logo-sub">She Can Travel</div>
    </div>
  </a>

  <main class="container">
    <h1>Bienvenue</h1>
    <div class="subtitle">Connexion à ton espace client</div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="ton@email.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          placeholder="Mot de passe"
          required
        >
      </div>

      <button type="submit">Se connecter</button>
    </form>

    <div class="divider">
      <span>OU</span>
    </div>

    <a class="btn-wa" href="https://wa.me/212600368626" target="_blank">
      Réserver via WhatsApp
    </a>

    <div class="switch">
      Pas encore de compte ? <a href="signup.html">S'inscrire</a>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>

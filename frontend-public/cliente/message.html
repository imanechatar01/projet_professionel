  <link rel="stylesheet" href="assets/css/pages/message.css">
  <link rel="stylesheet" href="assets/css/design-system.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/pages/client-panel.css">
</head>
<body>
  

 <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a class="logo" href="web_site.html">
        <div class="logo-mark">EW</div>
        <div>
          <div class="logo-text">ecotrips_women</div>
          <div class="logo-sub">She Can Travel</div>
        </div>
      </a>

      <div class="nav-links">
        <a href="web_site.html">Accueil</a>
        <a href="catalogue.html" >Voyages</a>
        <a href="web_site.html#galerie">Galerie</a>
        <a href="web_site.html#contact">Contact</a>
        <a href="message.html" class="nav-active">messages</a>
        <a href="login.html" class="nav-cta">Réserver</a>
      </div>

      <button class="menu-btn" onclick="toggleMobileMenu()" aria-label="Ouvrir le menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      
    </div>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="web_site.html" onclick="closeMobileMenu()">Accueil</a>
    <a href="catalogue.html" onclick="closeMobileMenu()">Voyages</a>
    <a href="web_site.html#galerie" onclick="closeMobileMenu()">Galerie</a>
    <a href="web_site.html#contact" onclick="closeMobileMenu()">Contact</a>
       <a href="message.html" class="nav-active">messages</a>
    <a href="login.html" onclick="closeMobileMenu()">Espace Client</a>
    <button class="mob-cta" onclick="window.location.href='login.html'">Réserver maintenant</button>
  </div>


<div class="chat-wrapper">
  <div class="chat-header">
    <div class="avatar">🌿</div>
    <div>
      <div class="chat-title">Ecotrips Women</div>
      <div class="chat-sub">
        <span class="online-dot"></span> Support voyage
      </div>
    </div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div id="messageList" style="display:flex;flex-direction:column;gap:10px;">
      <div class="empty-state">
        <i class="ti ti-message-circle"></i>
        Chargement…
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="newMsg" rows="1" placeholder="Écrire un message…"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
    <button class="send-btn" onclick="sendMessage()" title="Envoyer">
      <i class="ti ti-send"></i>
    </button>
  </div>
</div>

<script>
  const token = localStorage.getItem('clientToken');
  if (!token) window.location.href = 'login.html';

  function formatTime(dateStr) {
    return new Date(dateStr).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    const today = new Date();
    if (d.toDateString() === today.toDateString()) return 'Aujourd\'hui';
    return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
  }

  async function loadMessages() {
    const res = await fetch('/api/client/messages', {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    const container = document.getElementById('messageList');

    if (!data.success || !data.messages.length) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="ti ti-message-circle"></i>
          Aucun message pour l'instant. Dites bonjour !
        </div>`;
      return;
    }

    let lastDate = '';
    container.innerHTML = data.messages.map(msg => {
      const msgDate = formatDate(msg.created_at);
      const divider = msgDate !== lastDate
        ? `<div class="date-divider">${msgDate}</div>`
        : '';
      lastDate = msgDate;

      const clientRow = `
        <div class="msg-row client">
          <div class="bubble client">${escapeHtml(msg.message)}</div>
          <div class="msg-meta">Vous · ${formatTime(msg.created_at)}</div>
        </div>`;

      const agencyRow = msg.reponse ? `
        <div class="msg-row agency">
          <div class="agency-label">Ecotrips Women</div>
          <div class="bubble agency">${escapeHtml(msg.reponse)}</div>
          <div class="msg-meta">${formatTime(msg.updated_at)}</div>
        </div>` : `
        <div class="pending-badge" style="padding-left:4px;">
         
        </div>`;

      return divider + clientRow + agencyRow;
    }).join('');

    const area = document.getElementById('messagesArea');
    area.scrollTop = area.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('newMsg');
    const msg = input.value.trim();
    if (!msg) return;

    input.disabled = true;
    const res = await fetch('/api/client/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    input.disabled = false;

    if (data.success) {
      input.value = '';
      input.style.height = 'auto';
      loadMessages();
    } else {
      alert('Erreur lors de l\'envoi');
    }
  }

  loadMessages();
</script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/client-panel.js"></script>
</body>
</html>

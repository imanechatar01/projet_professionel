<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support - Ecotripswomen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #E91E63; margin-bottom: 20px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin: 10px 0;
        }
        button {
            background: #E91E63;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            cursor: pointer;
        }
        .message { margin-top: 10px; padding: 10px; border-radius: 8px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📩 Contacter le support</h1>
        
        <div id="successMsg" class="message success"></div>
        <div id="errorMsg" class="message error"></div>
        
        <form id="messageForm">
            <input type="text" id="sujet" placeholder="Sujet" required>
            <textarea id="message" rows="5" placeholder="Votre message..." required></textarea>
            <button type="submit">Envoyer</button>
        </form>
    </div>

    <script>
        const token = localStorage.getItem('clientToken');
        
        if (!token) {
            window.location.href = 'login.html';
        }

        const form = document.getElementById('messageForm');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const sujet = document.getElementById('sujet').value;
            const message = document.getElementById('message').value;
            
            try {
                const response = await fetch('/api/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ sujet, message })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('successMsg').textContent = data.message;
                    document.getElementById('successMsg').style.display = 'block';
                    form.reset();
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    document.getElementById('errorMsg').textContent = data.message;
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Erreur de connexion';
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>

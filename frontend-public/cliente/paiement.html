<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - Ecotripswomen</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #E91E63 0%, #c2185b 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
        }

        .form-content {
            padding: 30px;
        }

        .reservation-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border-left: 4px solid #E91E63;
        }

        .reservation-info h3 {
            color: #E91E63;
            margin-bottom: 10px;
        }

        .reservation-info p {
            margin: 8px 0;
            color: #555;
        }

        .card-element {
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            padding: 14px 16px;
            margin: 20px 0;
            background: white;
            transition: all 0.3s;
        }

        .card-element:hover {
            border-color: #E91E63;
        }

        .card-element:focus-within {
            border-color: #E91E63;
            box-shadow: 0 0 0 3px rgba(233,30,99,0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #E91E63 0%, #c2185b 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin: 20px 0;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .card-errors {
            color: #721c24;
            font-size: 14px;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 14px;
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .total-amount {
            font-size: 28px;
            font-weight: bold;
            color: #E91E63;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💳 Paiement sécurisé</h1>
            <p>Finalisez votre réservation en toute sécurité</p>
        </div>

        <div class="form-content">
            <div id="message" class="message"></div>

            <div id="reservationInfo" class="reservation-info">
                <h3>📋 Détails de la réservation</h3>
                <div id="reservationDetails">
                    <p>Chargement...</p>
                </div>
            </div>

            <div id="card-element" class="card-element"></div>
            <div id="card-errors" class="card-errors"></div>

            <button id="submit-btn">
                Payer
            </button>
        </div>

        <div class="footer">
            🔒 Paiement sécurisé par Stripe • Aucune information bancaire stockée
        </div>
    </div>

    <script>
        // Configuration Stripe (clé publique de test)
        const stripe = Stripe('pk_test_51QiXLvAcoBG5OygGdwWXlMCWgPg1DQym5s4scK7GR9pERWLi0BH7uIQA5AML7xbPNurJtAhjl9vkwgnAv4a3k48t00VbqsJ2Bk');
        const elements = stripe.elements();
        const card = elements.create('card', {
            style: {
                base: {
                    fontSize: '16px',
                    fontFamily: '"Segoe UI", Tahoma, Geneva, Verdana, sans-serif',
                    '::placeholder': { color: '#999' }
                }
            }
        });
        card.mount('#card-element');

        // Gestion des erreurs de la carte
        card.addEventListener('change', ({ error }) => {
            const displayError = document.getElementById('card-errors');
            if (error) {
                displayError.textContent = error.message;
            } else {
                displayError.textContent = '';
            }
        });

        // Récupérer l'ID de réservation depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const reservationId = urlParams.get('id');
        const token = localStorage.getItem('clientToken');

        // Vérifier si l'utilisateur est connecté
        if (!token) {
            window.location.href = 'login.html';
        }

        if (!reservationId) {
            document.getElementById('message').textContent = '❌ ID de réservation manquant';
            document.getElementById('message').className = 'message error';
            document.getElementById('submit-btn').disabled = true;
        }

      
        

        // Créer l'intention de paiement
        async function createPaymentIntent() {
            const response = await fetch('/api/paiement/create-intent', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ reservation_id: reservationId }),
               
            });
             console.log('Request payload:', { reservation_id: reservationId }) // Log de débogage
            return await response.json();
        }

        // Paiement
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('message');

        submitBtn.addEventListener('click', async () => {
            // Désactiver le bouton
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span>Traitement en cours...';

            try {
                // 1. Créer l'intention de paiement
                const intent = await createPaymentIntent();

                if (!intent.success) {
                    throw new Error(intent.message);
                }

                // 2. Confirmer le paiement avec Stripe
                const { error, paymentIntent } = await stripe.confirmCardPayment(intent.clientSecret, {
                    payment_method: { card: card }
                });

                if (error) {
                    messageDiv.textContent = '❌ ' + error.message;
                    messageDiv.className = 'message error';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Payer';
                } else if (paymentIntent.status === 'succeeded') {
                    messageDiv.textContent = '✅ Paiement réussi ! Redirection...';
                    messageDiv.className = 'message success';
                    
                    setTimeout(() => {
                        window.location.href = `web_site.html`;
                    }, 2000);
                }
            } catch (error) {
                console.error('Erreur:', error);
                messageDiv.textContent = '❌ ' + (error.message || 'Erreur lors du paiement');
                messageDiv.className = 'message error';
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Payer';
            }
        });

        // Charger la réservation au démarrage
        
    </script>
</body>
</html>

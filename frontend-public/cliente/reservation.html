<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Réserver | Ecotrips Women</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/design-system.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/reservation.css">
</head>

<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <a class="logo-link" href="web_site.html">
      <div class="logo-mark">EW</div>
      <div>
        <div class="logo-text">ecotrips_women</div>
        <div class="logo-sub">She Can Travel</div>
      </div>
    </a>

    <div class="topbar-links">
      <a href="web_site.html">Accueil</a>
      <a href="catalogue.html">Voyages</a>
      <a href="reservation.html" class="active">Ma réservation</a>
    </div>
  </header>

  <!-- HERO -->
  <section class="page-hero">
    <h1>Réserve ton aventure</h1>
    <p>Quelques informations et c'est parti.</p>
  </section>

  <!-- CARD -->
  <main class="card-wrap">
    <div class="card">
      <div class="card-body">

        <div id="userInfo" class="user-info">
          <div class="user-avatar" id="userInitials">?</div>
          <div>
            <div class="user-name" id="clientNom">—</div>
            <div class="user-label">Cliente connectée</div>
          </div>
        </div>

        <div id="message" class="message"></div>

        <form id="reservationForm">
          <div class="form-group">
            <label for="nb_personnes">Nombre de personnes *</label>
            <input
              type="number"
              id="nb_personnes"
              min="1"
              value="1"
              required
            >
          </div>

          <div class="form-group">
            <label for="montant_total">Montant total (MAD) *</label>
            <input
              type="number"
              id="montant_total"
              step="0.01"
              placeholder="Ex : 1150"
              required
            >
          </div>

          <div class="price-row" id="price-recap" style="display:none;">
            <span class="price-label">Total à régler</span>
            <span class="price-value" id="price-display">— MAD</span>
          </div>

          <div class="form-group">
            <label for="demande_speciale">Demande spéciale</label>
            <textarea
              id="demande_speciale"
              rows="3"
              placeholder="Allergies, régime alimentaire, besoin spécial..."
            ></textarea>
          </div>

          <button type="submit" id="submitBtn">
            Confirmer la réservation
          </button>
        </form>

      </div>
    </div>

    <div class="footer-mini">
      <p>
        Des questions ?
        <a href="https://wa.me/212600368626" target="_blank">
          WhatsApp +212 600 368 626
        </a>
      </p>

      <p style="margin-top:0.5rem;">
        <a href="catalogue.html">Retour au catalogue</a>
      </p>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/reservation.js"></script>
</body>
</html>

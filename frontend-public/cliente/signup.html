<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Ecotripswomen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .success {
            background: #efe;
            color: #0a0;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
        .switch {
            text-align: center;
            margin-top: 20px;
        }
        .switch a {
            color: #667eea;
            text-decoration: none;
        }
        .password-requirements {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 Ecotripswomen</h1>
        <div class="subtitle">Créer un compte client</div>
        
        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>
        
        <form id="registerForm">
            <div class="row">
                <div class="form-group">
                    <label>Nom *</label>
                    <input type="text" id="nom" placeholder="Dupont" required>
                </div>
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="prenom" placeholder="Marie">
                </div>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" placeholder="marie@email.com" required>
            </div>
            
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" id="telephone" placeholder="06 12 34 56 78">
            </div>
            
            <div class="form-group">
                <label>Mot de passe *</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div class="password-requirements">Minimum 6 caractères</div>
            </div>
            
            <div class="form-group">
                <label>Confirmer le mot de passe *</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="submitBtn">S'inscrire</button>
        </form>
        
        <div class="switch">
            Déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            // Récupérer les valeurs
            const nom = document.getElementById('nom').value.trim();
            const prenom = document.getElementById('prenom').value.trim();
            const email = document.getElementById('email').value.trim();
            const telephone = document.getElementById('telephone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validations
            if (!nom) {
                errorDiv.textContent = 'Le nom est requis';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!email) {
                errorDiv.textContent = 'L\'email est requis';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!email.includes('@')) {
                errorDiv.textContent = 'Email invalide';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (!password) {
                errorDiv.textContent = 'Le mot de passe est requis';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Les mots de passe ne correspondent pas';
                errorDiv.style.display = 'block';
                return;
            }
            
            // Désactiver bouton pendant l'envoi
            submitBtn.disabled = true;
            submitBtn.textContent = 'Inscription en cours...';
            
            try {
                const response = await fetch('http://localhost:5000/api/client/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nom, 
                        prenom: prenom || null, 
                        email, 
                        telephone: telephone || null, 
                        password 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Stocker le token et les infos client
                    localStorage.setItem('clientToken', data.token);
                    localStorage.setItem('client', JSON.stringify(data.client));
                    
                    successDiv.textContent = 'Inscription réussie ! Redirection vers le catalogue...';
                    successDiv.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'catalogue.html';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.message || 'Erreur lors de l\'inscription';
                    errorDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'S\'inscrire';
                }
            } catch (error) {
                console.error('Erreur:', error);
                errorDiv.textContent = 'Erreur de connexion au serveur. Vérifiez que le backend est démarré.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'S\'inscrire';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Inscription | Ecotrips Women</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/design-system.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
</head>

<body>

  <a class="logo-link" href="web_site.html">
    <div class="logo-mark">EW</div>
    <div>
      <div class="logo-text">ecotrips_women</div>
      <div class="logo-sub">She Can Travel</div>
    </div>
  </a>

  <main class="container">
    <h1>Rejoins-nous</h1>
    <div class="subtitle">Crée ton compte ecotrips_women</div>

    <div class="perks">
      <div class="perk">Réservation en ligne</div>
      <div class="perk">Suivi de tes voyages</div>
      <div class="perk">Offres exclusives</div>
      <div class="perk">Communauté féminine</div>
    </div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>

    <form id="registerForm">
      <div class="row">
        <div class="form-group">
          <label for="nom">Nom *</label>
          <input
            type="text"
            id="nom"
            placeholder="Benali"
            required
          >
        </div>

        <div class="form-group">
          <label for="prenom">Prénom</label>
          <input
            type="text"
            id="prenom"
            placeholder="Fatima"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input
          type="email"
          id="email"
          placeholder="ton@email.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="telephone">Téléphone / WhatsApp</label>
        <input
          type="tel"
          id="telephone"
          placeholder="+212 6XX XXX XXX"
        >
      </div>

      <div class="form-group">
        <label for="password">Mot de passe *</label>
        <input
          type="password"
          id="password"
          placeholder="Mot de passe"
          required
        >
        <div class="password-requirements">Minimum 6 caractères</div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe *</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Confirmer le mot de passe"
          required
        >
      </div>

      <button type="submit" id="submitBtn">Créer mon compte</button>
    </form>

    <div class="switch">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </div>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
